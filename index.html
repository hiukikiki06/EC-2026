<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ROBOT BLE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #050508;
  --panel: #0c0c14;
  --border: #1c1c2e;
  --green: #00ff88;
  --blue: #00d4ff;
  --red: #ff2d55;
  --yellow: #ffd60a;
  --white-clr: #e8e8ff;
  --black-clr: #666680;
  --text: #c8cce8;
  --muted: #3a3a55;
  --glow-g: 0 0 20px #00ff8844;
  --glow-b: 0 0 20px #00d4ff44;
  --glow-r: 0 0 20px #ff2d5544;
}

* { box-sizing:border-box; margin:0; padding:0;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation; user-select:none; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  font-family:'Share Tech Mono', monospace;
  color:var(--text);
  overflow:hidden;
}

/* ── SCAN LINE OVERLAY ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px
  );
}

/* ── LAYOUT ── */
.root {
  display:grid;
  grid-template-columns: 42vw 1fr 28vw;
  grid-template-rows: 100vh;
  gap:0;
  width:100vw; height:100vh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right)
           env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ── LEFT: D-PAD ── */
.side-left {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:12px; gap:6px;
  border-right:1px solid var(--border);
  position:relative;
}

/* ── CENTER: DASHBOARD ── */
.side-center {
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding:10px 8px; overflow:hidden;
}

/* ── RIGHT: ACTIONS ── */
.side-right {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:12px; gap:6px;
  border-left:1px solid var(--border);
}

/* ── CONNECT BUTTON ── */
.btn-conn {
  width:100%; padding:8px 4px;
  background:transparent; border:1px solid var(--green);
  border-radius:8px; color:var(--green);
  font-family:'Orbitron',monospace; font-size:9px;
  letter-spacing:2px; cursor:pointer; transition:all .15s;
  text-align:center;
}
.btn-conn:active { background:var(--green); color:var(--bg); }
.btn-conn.off { border-color:var(--red); color:var(--red); }

/* ── STATUS ROW ── */
.status-row {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%;
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--red); box-shadow:var(--glow-r);
  flex-shrink:0; transition:all .3s;
}
.dot.on { background:var(--green); box-shadow:var(--glow-g); }
.conn-txt { font-size:9px; letter-spacing:2px; color:var(--muted); }

/* ── STATS GRID ── */
.stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:4px; width:100%;
}
.stat {
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; padding:5px 7px;
  display:flex; flex-direction:column; gap:1px;
}
.stat-lbl { font-size:7px; letter-spacing:2px; color:var(--muted); }
.stat-val { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; }
.stat-val.g { color:var(--green); }
.stat-val.b { color:var(--blue); }
.stat-val.y { color:var(--yellow); }
.stat-val.r { color:var(--red); }

/* ── PATTERN BAR ── */
.pat-wrap { width:100%; }
.pat-lbl { font-size:7px; letter-spacing:2px; color:var(--muted); margin-bottom:4px; }
.pat-bar { display:flex; gap:2px; }
.pbit {
  flex:1; height:14px; border-radius:3px;
  background:var(--border); transition:background .07s, box-shadow .07s;
}
.pbit.on { background:var(--green); box-shadow:0 0 8px var(--green)99; }

/* ── COLOR MODE ── */
.color-row { display:grid; grid-template-columns:1fr 1fr; gap:4px; width:100%; }
.cpill {
  padding:6px 4px; border-radius:8px;
  border:1px solid var(--border); background:var(--panel);
  font-family:'Orbitron',monospace; font-size:8px;
  letter-spacing:1px; cursor:pointer; text-align:center;
  transition:all .15s;
}
.cpill .cico { font-size:14px; display:block; margin-bottom:2px; }
.cpill.white-btn { border-color:#ffffff33; color:#999; }
.cpill.black-btn { border-color:#66666633; color:#666; }
.cpill.white-btn.active {
  background:#ffffff12; border-color:#ffffffaa; color:#fff;
  box-shadow:0 0 12px #ffffff33;
}
.cpill.black-btn.active {
  background:#44444422; border-color:#aaaaaa88; color:#ccc;
  box-shadow:0 0 12px #88888833;
}

/* ── MODE PILLS ── */
.mode-row { display:grid; grid-template-columns:1fr 1fr; gap:4px; width:100%; }
.mpill {
  padding:6px 4px; border-radius:8px;
  border:1px solid var(--border); background:var(--panel);
  font-family:'Orbitron',monospace; font-size:8px;
  letter-spacing:1px; cursor:pointer; text-align:center;
  transition:all .15s;
}
.mpill.manual { border-color:var(--blue)55; color:var(--blue); }
.mpill.auto   { border-color:var(--green)55; color:var(--green); }
.mpill.am { background:var(--blue)20; border-color:var(--blue); box-shadow:var(--glow-b); }
.mpill.aa { background:var(--green)20; border-color:var(--green); box-shadow:var(--glow-g); }
.mpill:active { transform:scale(.94); }

/* ── SPEED SLIDER ── */
.spd-wrap { width:100%; }
.spd-lbl { font-size:7px; letter-spacing:2px; color:var(--muted); margin-bottom:4px;
           display:flex; justify-content:space-between; }
.spd-lbl span { font-family:'Orbitron',monospace; color:var(--yellow); font-size:10px; font-weight:700; }
input[type=range] {
  width:100%; -webkit-appearance:none; height:5px;
  border-radius:3px; background:var(--border); outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--yellow); box-shadow:0 0 10px var(--yellow)88; cursor:pointer;
}

/* ── LOG ── */
.log-box {
  width:100%; flex:1;
  background:#030305; border:1px solid var(--border);
  border-radius:8px; padding:5px 8px;
  overflow-y:auto; font-size:8px; line-height:1.8;
  color:var(--muted); min-height:0;
}
.log-box .li  { color:var(--green); }
.log-box .err { color:var(--red); }
.log-box .rx  { color:var(--blue); }

/* ────────────────────────────────
   D-PAD (LEFT)
──────────────────────────────── */
.dpad-label {
  font-family:'Orbitron',monospace; font-size:8px;
  letter-spacing:3px; color:var(--muted); margin-bottom:4px;
}
.dpad {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap:6px;
  width: min(38vw, 200px);
  aspect-ratio:1;
}
.dp {
  background:var(--panel); border:1px solid var(--border);
  border-radius:12px; display:flex; align-items:center;
  justify-content:center; font-size:20px; cursor:pointer;
  transition:all .08s; position:relative; overflow:hidden;
}
.dp::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background:var(--green); opacity:0; transition:opacity .08s;
}
.dp.pr, .dp:active {
  border-color:var(--green);
  box-shadow:var(--glow-g);
  transform:scale(.92);
}
.dp.pr::after, .dp:active::after { opacity:.15; }
.dp-empty { visibility:hidden; }
.dp-stop {
  background:var(--red)15; border-color:var(--red)55;
  font-family:'Orbitron',monospace; font-size:9px;
  font-weight:700; color:var(--red); letter-spacing:1px;
}
.dp-stop:active, .dp-stop.pr {
  border-color:var(--red); box-shadow:var(--glow-r);
  background:var(--red)25;
}
.dp-stop::after { background:var(--red); }

/* ────────────────────────────────
   ACTION BUTTONS (RIGHT)
──────────────────────────────── */
.action-label {
  font-family:'Orbitron',monospace; font-size:8px;
  letter-spacing:3px; color:var(--muted); margin-bottom:4px;
}
.action-group {
  display:flex; flex-direction:column; gap:8px;
  align-items:center; width:100%;
}
.act-btn {
  width:100%; padding:0; aspect-ratio:2/1;
  max-height:22vw;
  border-radius:16px; border:1px solid var(--border);
  background:var(--panel); cursor:pointer;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; transition:all .1s;
  position:relative; overflow:hidden;
}
.act-btn::after {
  content:''; position:absolute; inset:0;
  border-radius:inherit; opacity:0; transition:opacity .1s;
}
.act-btn .aico { font-size:clamp(18px,4vw,28px); line-height:1; }
.act-btn .albl {
  font-family:'Orbitron',monospace; font-size:clamp(7px,1.5vw,10px);
  letter-spacing:2px;
}

/* Kẹp */
.act-btn.kep { border-color:var(--yellow)55; color:var(--yellow); }
.act-btn.kep::after { background:var(--yellow); }
.act-btn.kep:active { border-color:var(--yellow); box-shadow:0 0 20px var(--yellow)44; transform:scale(.94); }
.act-btn.kep:active::after { opacity:.15; }

/* Thả */
.act-btn.tha { border-color:var(--blue)55; color:var(--blue); }
.act-btn.tha::after { background:var(--blue); }
.act-btn.tha:active { border-color:var(--blue); box-shadow:var(--glow-b); transform:scale(.94); }
.act-btn.tha:active::after { opacity:.15; }

/* ── DIVIDER ── */
.divider {
  width:1px; height:30px; background:var(--border);
  margin:2px auto;
}

/* ── DISABLED ── */
body.disc .dp:not(.dp-stop),
body.disc .act-btn,
body.disc .mpill,
body.disc .cpill,
body.disc input[type=range]
{ opacity:.25; pointer-events:none; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body class="disc">

<div class="root">

  <!-- ══════════════ LEFT: D-PAD ══════════════ -->
  <div class="side-left">
    <div class="dpad-label">MOVE</div>
    <div class="dpad">
      <div class="dp-empty"></div>
      <div class="dp" id="dF"
           ontouchstart="press('FWD',this);return false;"
           ontouchend="release();return false;"
           onmousedown="press('FWD',this)"
           onmouseup="release()">▲</div>
      <div class="dp-empty"></div>

      <div class="dp" id="dL"
           ontouchstart="press('LFT',this);return false;"
           ontouchend="release();return false;"
           onmousedown="press('LFT',this)"
           onmouseup="release()">◀</div>
      <div class="dp dp-stop" id="dS"
           ontouchstart="sendCmd('STP');return false;"
           onmousedown="sendCmd('STP')">STOP</div>
      <div class="dp" id="dR"
           ontouchstart="press('RGT',this);return false;"
           ontouchend="release();return false;"
           onmousedown="press('RGT',this)"
           onmouseup="release()">▶</div>

      <div class="dp-empty"></div>
      <div class="dp" id="dB"
           ontouchstart="press('BWD',this);return false;"
           ontouchend="release();return false;"
           onmousedown="press('BWD',this)"
           onmouseup="release()">▼</div>
      <div class="dp-empty"></div>
    </div>
  </div>

  <!-- ══════════════ CENTER: DASHBOARD ══════════════ -->
  <div class="side-center">

    <!-- Connect + status -->
    <div style="width:100%;display:flex;flex-direction:column;gap:5px;">
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <span class="conn-txt" id="connTxt">CHƯA KẾT NỐI</span>
      </div>
      <button class="btn-conn" id="btnConn" onclick="toggleConn()">⚡ KẾT NỐI BLE</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-lbl">MODE</div>
        <div class="stat-val g" id="sMode">IDLE</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">CASE</div>
        <div class="stat-val b" id="sCase">-</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">POS</div>
        <div class="stat-val y" id="sPos">3500</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">ERR/CNT</div>
        <div class="stat-val r" id="sErr">0/0</div>
      </div>
    </div>

    <!-- Pattern -->
    <div class="pat-wrap">
      <div class="pat-lbl">SENSOR</div>
      <div class="pat-bar">
        <div class="pbit" id="b0"></div><div class="pbit" id="b1"></div>
        <div class="pbit" id="b2"></div><div class="pbit" id="b3"></div>
        <div class="pbit" id="b4"></div><div class="pbit" id="b5"></div>
        <div class="pbit" id="b6"></div><div class="pbit" id="b7"></div>
      </div>
    </div>

    <!-- Color select -->
    <div class="color-row">
      <div class="cpill white-btn active" id="cpW">
        <span class="cico">⬜</span>TRẮNG
      </div>
      <div class="cpill black-btn" id="cpB">
        <span class="cico">⬛</span>ĐEN
      </div>
    </div>

    <!-- Mode -->
    <div class="mode-row">
      <div class="mpill manual" id="pmM" onclick="setManual()">🕹 MANUAL</div>
      <div class="mpill auto"   id="pmA" onclick="setAuto()">🤖 AUTO</div>
    </div>

    <!-- Speed -->
    <div class="spd-wrap">
      <div class="spd-lbl">SPD <span id="spdVal">120</span></div>
      <input type="range" id="spdSlider" min="30" max="255" value="120"
             oninput="onSpd(this.value)" onchange="sendSpd(this.value)">
    </div>

    <!-- Log -->
    <div class="log-box" id="logBox">
      <div class="li">» Sẵn sàng kết nối BLE...</div>
    </div>

  </div>

  <!-- ══════════════ RIGHT: GRIP ══════════════ -->
  <div class="side-right">
    <div class="action-label">ACTION</div>
    <div class="action-group">
      <div class="act-btn kep" id="btnGrp">
        <span class="aico">🦾</span>
        <span class="albl">KẸP</span>
      </div>
      <div class="divider"></div>
      <div class="act-btn tha" id="btnRel">
        <span class="aico">🤲</span>
        <span class="albl">THẢ</span>
      </div>
    </div>
  </div>

</div><!-- /root -->

<script>
const SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX ='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const TX ='6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device,rxChar,txChar,connected=false,pressTimer=null;
let selectedColor='WHITE';

// ── LOG ──
function log(msg,cls='li'){
  const b=document.getElementById('logBox');
  const el=document.createElement('div');
  el.className=cls; el.textContent='»'+msg;
  b.appendChild(el); b.scrollTop=b.scrollHeight;
  while(b.children.length>30) b.removeChild(b.firstChild);
}

// ── CONNECT ──
async function toggleConn(){
  if(connected){device?.gatt.disconnect();return;}
  if(!navigator.bluetooth){log('Cần Chrome Android!','err');return;}
  try{
    log('Quét ROBOT_BLE...');
    device=await navigator.bluetooth.requestDevice({
      filters:[{name:'ROBOT_BLE'}],optionalServices:[SVC]});
    device.addEventListener('gattserverdisconnected',onDisc);
    const s=await device.gatt.connect();
    const svc=await s.getPrimaryService(SVC);
    rxChar=await svc.getCharacteristic(RX);
    txChar=await svc.getCharacteristic(TX);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged',onNotify);
    setConn(true); log('OK: '+device.name);
  }catch(e){log('ERR: '+e.message,'err');}
}
function onDisc(){setConn(false);log('Ngắt kết nối','err');}
function setConn(v){
  connected=v;
  document.getElementById('dot').className='dot'+(v?' on':'');
  document.getElementById('connTxt').textContent=v?'ĐÃ KẾT NỐI':'CHƯA KẾT NỐI';
  document.getElementById('btnConn').textContent=v?'✕ NGẮT':'⚡ KẾT NỐI BLE';
  document.getElementById('btnConn').className='btn-conn'+(v?' off':'');
  document.body.className=v?'':'disc';
}

// ── NOTIFY ──
function onNotify(e){
  const raw=new TextDecoder().decode(e.target.value);
  if(raw.startsWith('LOG:')){log(' '+raw.substring(4),'rx');return;}
  try{
    const d=JSON.parse(raw);
    if(d.mode!==undefined) document.getElementById('sMode').textContent=d.mode;
    if(d.case!==undefined) document.getElementById('sCase').textContent=d.case;
    if(d.pos !==undefined) document.getElementById('sPos').textContent=d.pos;
    if(d.err!==undefined && d.cnt!==undefined)
      document.getElementById('sErr').textContent=d.err+'/'+d.cnt;
    if(d.spd!==undefined){
      document.getElementById('spdSlider').value=d.spd;
      document.getElementById('spdVal').textContent=d.spd;
    }
    if(d.pat!==undefined) updatePat(d.pat);
    if(d.color!==undefined) syncColor(d.color);
    if(d.mode==='MANUAL') activateMode('manual');
    else if(d.mode==='AUTO') activateMode('auto');
  }catch(_){log(' '+raw,'rx');}
}

function updatePat(pat){
  for(let i=0;i<8;i++){
    const el=document.getElementById('b'+i);
    if(el) el.className='pbit'+(pat[i]==='1'?' on':'');
  }
}

function syncColor(c){
  selectedColor=c;
  document.getElementById('cpW').className='cpill white-btn'+(c==='WHITE'?' active':'');
  document.getElementById('cpB').className='cpill black-btn'+(c==='BLACK'?' active':'');
}

// ── SEND ──
async function sendCmd(cmd){
  if(!connected||!rxChar)return;
  try{
    const data=new TextEncoder().encode(cmd);
    try{ await rxChar.writeValueWithoutResponse(data); }
    catch(_){ await rxChar.writeValue(data); }
    log(' [TX] '+cmd);
  }catch(e){log(' ERR: '+e.message,'err');}
}

// ── SPEED ──
function onSpd(v){document.getElementById('spdVal').textContent=v;}
function sendSpd(v){sendCmd('SPD:'+v);}

// ── D-PAD ──
function press(cmd,el){
  el.classList.add('pr');
  sendCmd(cmd);
  if(pressTimer)clearInterval(pressTimer);
  pressTimer=setInterval(()=>sendCmd(cmd),100);
}
function release(){
  document.querySelectorAll('.dp').forEach(b=>b.classList.remove('pr'));
  if(pressTimer){clearInterval(pressTimer);pressTimer=null;}
  sendCmd('STP');
}

// ── MODE ──
function setManual(){sendCmd('MANUAL');activateMode('manual');}
function setAuto(){
  sendCmd(selectedColor);
  setTimeout(()=>sendCmd('AUTO'),80);
  activateMode('auto');
}
function activateMode(m){
  document.getElementById('pmM').className='mpill manual'+(m==='manual'?' am':'');
  document.getElementById('pmA').className='mpill auto'  +(m==='auto'  ?' aa':'');
}

// ── COLOR ──
function setColor(c){
  selectedColor=c; sendCmd(c); syncColor(c);
}

// ── TOUCH EVENTS (không dùng onclick để tránh delay 300ms) ──
// D-pad đã dùng ontouchstart inline

// Color pills
document.getElementById('cpW').addEventListener('touchend',e=>{
  e.preventDefault(); setColor('WHITE');
},{passive:false});
document.getElementById('cpB').addEventListener('touchend',e=>{
  e.preventDefault(); setColor('BLACK');
},{passive:false});

// Mode pills
document.getElementById('pmM').addEventListener('touchend',e=>{
  e.preventDefault(); setManual();
},{passive:false});
document.getElementById('pmA').addEventListener('touchend',e=>{
  e.preventDefault(); setAuto();
},{passive:false});

// Grip buttons
document.getElementById('btnGrp').addEventListener('touchstart',e=>{
  e.preventDefault(); sendCmd('GRP');
},{passive:false});
document.getElementById('btnRel').addEventListener('touchstart',e=>{
  e.preventDefault(); sendCmd('REL');
},{passive:false});

// Prevent scroll on all interactive elements
document.querySelectorAll('.dp,.act-btn').forEach(el=>{
  el.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
  el.addEventListener('touchend',  e=>e.preventDefault(),{passive:false});
});

// Mouse fallback cho grip
document.getElementById('btnGrp').addEventListener('mousedown',()=>sendCmd('GRP'));
document.getElementById('btnRel').addEventListener('mousedown',()=>sendCmd('REL'));
</script>
</body>
</html>
