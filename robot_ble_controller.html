<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ROBOT BLE Controller</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --accent: #00f5a0;
    --accent2: #00d4ff;
    --danger: #ff4060;
    --warn: #ffb830;
    --text: #e0e0f0;
    --muted: #555570;
    --btn-bg: #1a1a2a;
    --btn-active: #00f5a020;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    gap: 12px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .title { font-size: 14px; font-weight: bold; letter-spacing: 3px; color: var(--accent); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--danger);
    box-shadow: 0 0 8px var(--danger);
    transition: all .4s;
  }
  .status-dot.on { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .status-text { font-size: 11px; color: var(--muted); margin-left: 8px; }
  .status-wrap { display: flex; align-items: center; gap: 6px; }

  /* ── CONNECT BUTTON ── */
  .btn-connect {
    width: 100%;
    max-width: 480px;
    padding: 14px;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: bold;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-connect:active { background: var(--accent); color: var(--bg); }
  .btn-connect.connected { border-color: var(--danger); color: var(--danger); }

  /* ── CARDS ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  /* ── D-PAD ── */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    aspect-ratio: 1;
    max-width: 240px;
    margin: 0 auto;
  }
  .dpad-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    transition: all .1s;
    user-select: none;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: var(--btn-active);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent)55;
    transform: scale(0.93);
  }
  .dpad-empty { visibility: hidden; }
  .dpad-center {
    background: var(--danger)22;
    border-color: var(--danger)66;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--danger);
    font-weight: bold;
  }
  .dpad-center:active { background: var(--danger)44; border-color: var(--danger); box-shadow: 0 0 16px var(--danger)55; }

  /* ── GRIP BUTTONS ── */
  .grip-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .grip-btn {
    padding: 18px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    user-select: none;
  }
  .grip-btn .icon { font-size: 24px; display: block; margin-bottom: 6px; }
  .grip-btn.grip-close { border-color: var(--warn)66; color: var(--warn); }
  .grip-btn.grip-close:active { background: var(--warn)22; box-shadow: 0 0 16px var(--warn)44; transform: scale(0.95); }
  .grip-btn.grip-open  { border-color: var(--accent2)66; color: var(--accent2); }
  .grip-btn.grip-open:active  { background: var(--accent2)22; box-shadow: 0 0 16px var(--accent2)44; transform: scale(0.95); }

  /* ── PRESET BUTTONS ── */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .preset-btn {
    padding: 12px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .preset-btn .plabel { font-size: 9px; display: block; margin-top: 3px; color: var(--muted); }
  .preset-btn:active { border-color: var(--accent2); color: var(--accent2); background: var(--accent2)15; transform: scale(0.94); }
  .preset-btn.white { border-color: #ffffff33; }
  .preset-btn.black { border-color: #888; }

  /* ── MODE BUTTONS ── */
  .mode-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .mode-btn {
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .15s;
  }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.manual { border-color: var(--accent2)66; color: var(--accent2); }
  .mode-btn.auto   { border-color: var(--accent)66;  color: var(--accent);  }
  .mode-btn.active-manual { background: var(--accent2)20; border-color: var(--accent2); box-shadow: 0 0 12px var(--accent2)44; }
  .mode-btn.active-auto   { background: var(--accent)20;  border-color: var(--accent);  box-shadow: 0 0 12px var(--accent)44;  }

  /* ── LOG ── */
  .log-box {
    width: 100%;
    max-width: 480px;
    background: #050508;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    height: 80px;
    overflow-y: auto;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
  }
  .log-box .log-line { color: var(--accent); }
  .log-box .log-err  { color: var(--danger); }

  /* ── DISABLED STATE ── */
  body.disconnected .dpad-btn:not(.dpad-center),
  body.disconnected .grip-btn,
  body.disconnected .preset-btn,
  body.disconnected .mode-btn {
    opacity: 0.35;
    pointer-events: none;
  }
</style>
</head>
<body class="disconnected">

<!-- HEADER -->
<div class="header">
  <span class="title">ROBOT BLE</span>
  <div class="status-wrap">
    <div class="status-dot" id="dot"></div>
    <span class="status-text" id="statusText">CHƯA KẾT NỐI</span>
  </div>
</div>

<!-- CONNECT -->
<button class="btn-connect" id="btnConnect" onclick="toggleConnect()">
  ⚡ KẾT NỐI BLE
</button>

<!-- D-PAD -->
<div class="card">
  <div class="card-title">◈ DI CHUYỂN</div>
  <div class="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-FWD"
         ontouchstart="press('FWD',this)" ontouchend="release('STP')"
         onmousedown="press('FWD',this)" onmouseup="release('STP')">▲</div>
    <div class="dpad-empty"></div>

    <div class="dpad-btn" id="btn-LFT"
         ontouchstart="press('LFT',this)" ontouchend="release('STP')"
         onmousedown="press('LFT',this)" onmouseup="release('STP')">◀</div>
    <div class="dpad-btn dpad-center" onclick="sendCmd('STP')">STOP</div>
    <div class="dpad-btn" id="btn-RGT"
         ontouchstart="press('RGT',this)" ontouchend="release('STP')"
         onmousedown="press('RGT',this)" onmouseup="release('STP')">▶</div>

    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-BWD"
         ontouchstart="press('BWD',this)" ontouchend="release('STP')"
         onmousedown="press('BWD',this)" onmouseup="release('STP')">▼</div>
    <div class="dpad-empty"></div>
  </div>
</div>

<!-- GRIP -->
<div class="card">
  <div class="card-title">◈ GẮP VẬT</div>
  <div class="grip-row">
    <div class="grip-btn grip-close" ontouchstart="sendCmd('GRP')" onmousedown="sendCmd('GRP')">
      <span class="icon">🦾</span>KẸP (GRP)
    </div>
    <div class="grip-btn grip-open" ontouchstart="sendCmd('REL')" onmousedown="sendCmd('REL')">
      <span class="icon">🤲</span>THẢ (REL)
    </div>
  </div>
</div>

<!-- PRESET GAP VAT -->
<div class="card">
  <div class="card-title">◈ GẮP VẬT TỰ ĐỘNG</div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:10px;">VẬT TRẮNG</div>
  <div class="preset-grid" style="margin-bottom:10px;">
    <div class="preset-btn white" onclick="sendCmd('G1')">G1<span class="plabel">Trắng 1</span></div>
    <div class="preset-btn white" onclick="sendCmd('G2')">G2<span class="plabel">Trắng 2</span></div>
    <div class="preset-btn white" onclick="sendCmd('G3')">G3<span class="plabel">Trắng 3</span></div>
    <div class="preset-btn white" onclick="sendCmd('G4')">G4<span class="plabel">Trắng 4</span></div>
  </div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:10px;">VẬT ĐEN</div>
  <div class="preset-grid">
    <div class="preset-btn black" onclick="sendCmd('G5')">G5<span class="plabel">Đen 1</span></div>
    <div class="preset-btn black" onclick="sendCmd('G6')">G6<span class="plabel">Đen 2</span></div>
    <div class="preset-btn black" onclick="sendCmd('G7')">G7<span class="plabel">Đen 3</span></div>
    <div class="preset-btn black" onclick="sendCmd('G8')">G8<span class="plabel">Đen 4</span></div>
  </div>
</div>

<!-- MODE -->
<div class="card">
  <div class="card-title">◈ CHẾ ĐỘ</div>
  <div class="mode-row">
    <button class="mode-btn manual" id="btnManual" onclick="sendCmd('MANUAL');setMode('manual')">
      🕹 MANUAL
    </button>
    <button class="mode-btn auto" id="btnAuto" onclick="sendCmd('AUTO');setMode('auto')">
      🤖 AUTO
    </button>
  </div>
</div>

<!-- LOG -->
<div class="log-box" id="log">
  <div class="log-line">» Sẵn sàng kết nối BLE...</div>
</div>

<script>
// ── BLE config ──
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device, server, rxChar, txChar;
let connected = false;
let pressTimer = null;
let currentMode = null;

// ── LOG ──
function log(msg, cls='log-line') {
  const box = document.getElementById('log');
  const el = document.createElement('div');
  el.className = cls;
  el.textContent = '» ' + msg;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  // giới hạn 30 dòng
  while (box.children.length > 30) box.removeChild(box.firstChild);
}

// ── STATUS ──
function setConnected(val) {
  connected = val;
  document.getElementById('dot').className = 'status-dot' + (val ? ' on' : '');
  document.getElementById('statusText').textContent = val ? 'ĐÃ KẾT NỐI' : 'CHƯA KẾT NỐI';
  const btn = document.getElementById('btnConnect');
  btn.textContent = val ? '✕ NGẮT KẾT NỐI' : '⚡ KẾT NỐI BLE';
  btn.className = 'btn-connect' + (val ? ' connected' : '');
  document.body.className = val ? '' : 'disconnected';
}

// ── CONNECT ──
async function toggleConnect() {
  if (connected) { disconnect(); return; }
  if (!navigator.bluetooth) {
    log('Trình duyệt không hỗ trợ Web BLE! Dùng Chrome/Edge trên Android.', 'log-err');
    return;
  }
  try {
    log('Đang quét thiết bị BLE...');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'ROBOT_BLE' }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);
    log('Đang kết nối GATT...');
    server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    rxChar = await service.getCharacteristic(RX_UUID);
    txChar = await service.getCharacteristic(TX_UUID);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onNotify);
    setConnected(true);
    log('Kết nối thành công: ' + device.name);
  } catch(e) {
    log('Lỗi: ' + e.message, 'log-err');
  }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
}

function onDisconnected() {
  setConnected(false);
  log('Đã ngắt kết nối BLE', 'log-err');
}

function onNotify(e) {
  const val = new TextDecoder().decode(e.target.value);
  log('[RX] ' + val);
}

// ── SEND ──
async function sendCmd(cmd) {
  if (!connected || !rxChar) return;
  try {
    const data = new TextEncoder().encode(cmd);
    await rxChar.writeValueWithoutResponse(data);
    log('[TX] ' + cmd);
  } catch(e) {
    log('Gửi lỗi: ' + e.message, 'log-err');
  }
}

// ── D-PAD PRESS / RELEASE ──
function press(cmd, el) {
  el.classList.add('pressed');
  sendCmd(cmd);
  // Gửi lặp mỗi 150ms khi giữ nút
  if (pressTimer) clearInterval(pressTimer);
  pressTimer = setInterval(() => sendCmd(cmd), 150);
}

function release(cmd) {
  document.querySelectorAll('.dpad-btn').forEach(b => b.classList.remove('pressed'));
  if (pressTimer) { clearInterval(pressTimer); pressTimer = null; }
  sendCmd(cmd);
}

// ── MODE ──
function setMode(m) {
  currentMode = m;
  document.getElementById('btnManual').className = 'mode-btn manual' + (m === 'manual' ? ' active-manual' : '');
  document.getElementById('btnAuto').className   = 'mode-btn auto'   + (m === 'auto'   ? ' active-auto'   : '');
}

// Ngăn scroll khi dùng d-pad
document.querySelectorAll('.dpad-btn, .grip-btn').forEach(el => {
  el.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  el.addEventListener('touchend',   e => e.preventDefault(), { passive: false });
});
</script>
</body>
</html>
